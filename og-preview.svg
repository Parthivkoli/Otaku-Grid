<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f18"/>
      <stop offset="100%" style="stop-color:#161b2e"/>
    </linearGradient>
    <linearGradient id="underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#02a9ff"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#02a9ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#02a9ff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <rect width="1200" height="630" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </rect>

  <!-- Accent glow blob -->
  <ellipse cx="600" cy="315" rx="400" ry="200" fill="url(#accent-glow)"/>

  <!-- Decorative mini grid tiles (top-left) -->
  <rect x="60" y="60" width="55" height="75" rx="8" fill="#ef4444" opacity="0.7"/>
  <rect x="125" y="60" width="55" height="75" rx="8" fill="#02a9ff" opacity="0.7"/>
  <rect x="60" y="145" width="55" height="75" rx="8" fill="#34d399" opacity="0.7"/>
  <rect x="125" y="145" width="55" height="75" rx="8" fill="#facc15" opacity="0.7"/>

  <!-- Decorative mini grid tiles (bottom-right) -->
  <rect x="1020" y="420" width="55" height="75" rx="8" fill="#f472b6" opacity="0.7"/>
  <rect x="1085" y="420" width="55" height="75" rx="8" fill="#a78bfa" opacity="0.7"/>
  <rect x="1020" y="505" width="55" height="75" rx="8" fill="#fb923c" opacity="0.7"/>
  <rect x="1085" y="505" width="55" height="75" rx="8" fill="#38bdf8" opacity="0.7"/>

  <!-- Wordmark: OTAKU -->
  <text x="600" y="270" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="120" text-anchor="middle" fill="#ffffff" letter-spacing="-4">OTAKU</text>

  <!-- Wordmark: GRID -->
  <text x="600" y="390" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="120" text-anchor="middle" fill="#02a9ff" letter-spacing="-4">GRID</text>

  <!-- Gradient underline -->
  <rect x="300" y="408" width="600" height="3" rx="2" fill="url(#underline)"/>

  <!-- Tagline -->
  <text x="600" y="460" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="24" text-anchor="middle" fill="rgba(240,244,255,0.55)" letter-spacing="3">ANIME COLLAGE &amp; GRAPH VISUALIZER</text>

  <!-- URL -->
  <text x="600" y="570" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="18" text-anchor="middle" fill="rgba(2,169,255,0.6)">parthivkoli.github.io/Otaku-Grid</text>
</svg>
