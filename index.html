<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Otaku Grid - Anime Collage Creator</title>\n    <link rel="stylesheet" href="styles.css">\n    <script src="script.js" defer></script>\n</head>\n<body class="dark-theme">\n    <header>\n        <h1>Anime Collage Creator</h1>\n        <button id="settingsBtn">Settings</button>\n    </header>\n    <main>\n        <div id="gridContainer">\n            <!-- Placeholder for anime images -->\n            <div class="grid-item"></div>\n            <div class="grid-item"></div>\n            <div class="grid-item"></div>\n            <div class="grid-item"></div>\n            <div class="grid-item"></div>\n            <div class="grid-item"></div>\n        </div>\n    </main>\n    <footer>\n        <p>Created by Otaku Enthusiasts</p>\n    </footer>\n    <div id="settingsModal" class="modal">\n        <div class="modal-content">\n            <span class="close-btn">&times;</span>\n            <h2>Settings</h2>\n            <label for="gridSize">Grid Size:</label>\n            <input type="range" id="gridSize" min="1" max="10" value="5">\n            <button id="saveSettings">Save</button>\n        </div>\n    </div>\n    <div id="toast" class="toast">Settings saved successfully!</div>\n    <script>\n        // JavaScript for modal and toast notifications\n        document.getElementById('settingsBtn').onclick = function() {\n            document.getElementById('settingsModal').style.display = 'block';\n        };\n        document.querySelector('.close-btn').onclick = function() {\n            document.getElementById('settingsModal').style.display = 'none';\n        };\n        document.getElementById('saveSettings').onclick = function() {\n            document.getElementById('toast').style.visibility = 'visible';\n            setTimeout(function() {\n                document.getElementById('toast').style.visibility = 'hidden';\n            }, 3000);\n            document.getElementById('settingsModal').style.display = 'none';\n        };\n    <\/script>\n</body>\n</html>
