<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Otaku Grid - Anime Collage Generator</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👒</text></svg>">
</head>
<body>
	<div class="app-layout">
		<!-- Sidebar Controls -->
		<aside class="sidebar" aria-label="Settings and controls panel">
			<div class="sidebar-brand">
				<h1>Otaku Grid</h1>
				<p class="tagline">Anime Collage Generator</p>
			</div>

			<div class="sidebar-section">
				<label class="sidebar-title" for="anime-input">Anime Titles (one per line)</label>
				<textarea
					id="anime-input"
					class="anime-textarea"
					aria-label="Anime title list input"
					placeholder="Enter titles..."
				></textarea>
				<div class="preset-buttons" style="flex-wrap: wrap;">
					<button class="preset-btn" id="preset-shonen" type="button" title="Top Shonen">🔥</button>
					<button class="preset-btn" id="preset-romance" type="button" title="Romance">💕</button>
					<button class="preset-btn" id="preset-starter" type="button" title="Starter Pack">🌟</button>
					<button class="preset-btn" id="preset-isekai" type="button" title="Isekai">🌍</button>
					<button class="preset-btn" id="preset-fantasy" type="button" title="Fantasy">⚔️</button>
				</div>
				
				<h3 class="sidebar-title" style="margin-top: 1rem;">Seasonal Data</h3>
				<div class="preset-buttons">
					<button class="preset-btn" id="season-current" type="button" style="font-size: 0.8rem; font-weight: 700;">Current Season</button>
					<button class="preset-btn" id="season-previous" type="button" style="font-size: 0.8rem; font-weight: 700;">Prev Season</button>
				</div>
				<button class="btn btn-primary generate-btn" id="fetch-btn" type="button">Generate Collage</button>
			</div>

			<div class="sidebar-section">
				<h3 class="sidebar-title">Source</h3>
				<div class="toggle-group" role="group" aria-label="Data source selector">
					<button type="button" class="toggle-btn active" data-source="anilist">AniList</button>
					<button type="button" class="toggle-btn" data-source="mal">MAL</button>
				</div>
			</div>

			<div class="sidebar-section">
				<h3 class="sidebar-title">Grid Configuration</h3>
				<div class="segmented-buttons" role="group" aria-label="Grid size selector">
					<button type="button" class="seg-btn active" data-grid="3">3×3</button>
					<button type="button" class="seg-btn" data-grid="4">4×4</button>
					<button type="button" class="seg-btn" data-grid="5">5×5</button>
					<button type="button" class="seg-btn" data-grid="auto">Auto</button>
					<button type="button" class="seg-btn" id="custom-grid-btn">Custom</button>
				</div>
				<div id="custom-grid-inputs" style="display: none; gap: 8px; margin-top: 8px;">
					<input type="number" id="custom-cols" class="anime-textarea" style="height: 36px; padding: 4px 8px; flex: 1;" min="1" max="15" placeholder="Cols (e.g. 5)" value="5">
					<input type="number" id="custom-rows" class="anime-textarea" style="height: 36px; padding: 4px 8px; flex: 1;" min="1" max="15" placeholder="Rows (e.g. 2)" value="2">
					<button type="button" id="apply-custom-grid" class="btn btn-primary" style="padding: 0 12px;">Apply</button>
				</div>
				
				<h3 class="sidebar-title" style="margin-top: 1.5rem;">Card Style</h3>
				<div class="segmented-buttons" role="group" aria-label="Card style selector">
					<button type="button" class="style-btn active" data-style="default">Default</button>
					<button type="button" class="style-btn" data-style="polaroid">Polaroid</button>
				</div>
			</div>

			<div class="sidebar-section">
				<h3 class="sidebar-title">Options</h3>
				<label class="checkbox-label" style="margin-bottom: 0.75rem;">
					<input type="checkbox" id="overlay-toggle" checked>
					<span>Show Titles</span>
				</label>
				
				<h3 class="sidebar-title" style="margin-top: 1.5rem;">Export Background</h3>
				<div class="segmented-buttons" role="group" aria-label="Background selector" style="flex-wrap: wrap;">
					<button type="button" class="bg-btn active" data-bg="#000000">Dark</button>
					<button type="button" class="bg-btn" data-bg="transparent">Clear</button>
					<button type="button" class="bg-btn" data-bg="gradient-midnight">Midnight</button>
					<button type="button" class="bg-btn" data-bg="gradient-cyberpunk">Cyber</button>
					<button type="button" class="bg-btn" data-bg="gradient-sakura">Sakura</button>
					<button type="button" class="bg-btn" data-bg="gradient-abyss">Abyss</button>
				</div>
			</div>

			<div class="sidebar-footer">
				<button class="btn btn-secondary sidebar-btn" id="edit-grid-btn" type="button">✏️ Edit Grid</button>
				<button class="btn btn-secondary sidebar-btn" id="settings-btn" type="button">⚙️ Settings</button>
				<a href="https://github.com/Parthivkoli/Otaku-Grid" target="_blank" class="btn btn-secondary sidebar-btn" style="text-decoration: none; gap: 8px;">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
					View Repo
				</a>
			</div>
		</aside>

		<!-- Main Canvas Area -->
		<main class="content-area">
			<!-- Top Action Bar -->
			<header class="main-header" style="justify-content: flex-end; padding: 1rem 2rem;">
				<div class="export-controls">
					<select id="export-format" class="export-format-select" aria-label="Export Format">
						<option value="png">PNG Image</option>
						<option value="jpeg">JPEG Image</option>
					</select>
					<button class="btn btn-outline-glow" id="export-btn" type="button">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
						Export Collage
					</button>
					<button class="btn btn-secondary" id="copy-link-btn" type="button" title="Share Link">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
					</button>
				</div>
			</header>

			<div class="collage-canvas">
				<div id="grid-container" class="grid-container grid-3x3">
					<!-- Tiles dynamically generated via JS -->
				</div>
			</div>
		</main>
	</div>

	<div id="settings-modal" class="modal" aria-hidden="true">
		<div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="settings-title">
			<div class="modal-header">
				<h2 id="settings-title">Settings</h2>
				<button id="modal-close" class="modal-close" type="button" aria-label="Close settings">&times;</button>
			</div>
			<div class="modal-body">
				<div class="setting-item">
					<h3>Cache</h3>
					<p class="setting-description">Clear stored search results from localStorage.</p>
					<button id="clear-cache-btn" class="btn btn-danger" type="button" aria-label="Clear local cache">Clear Cache</button>
				</div>
			</div>
		</div>
	</div>

	<div id="edit-modal" class="modal" aria-hidden="true">
		<div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="edit-title">
			<div class="modal-header">
				<h2 id="edit-title">Edit Tile</h2>
				<button id="edit-modal-close" class="modal-close" type="button" aria-label="Close edit tile dialog">&times;</button>
			</div>
			<div class="modal-body">
				<div class="setting-item">
					<h3>Replace Title</h3>
					<p class="setting-description">Enter a new title and fetch its cover art for this tile.</p>
					<input id="edit-title-input" class="anime-textarea" aria-label="New title for selected tile" placeholder="Type a new anime title" />
				</div>
				<div class="actions-row">
					<button id="edit-save-btn" class="btn btn-primary" type="button" aria-label="Save edited tile">Save Tile</button>
					<button id="edit-remove-btn" class="btn btn-danger" type="button" aria-label="Remove selected tile">Remove Tile</button>
				</div>
			</div>
		</div>
	</div>

	<div id="toast" class="toast" role="status" aria-live="polite">
		<span id="toast-message"></span>
		<button id="toast-close" class="toast-close" type="button" aria-label="Dismiss message">&times;</button>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
	<script src="app.js" defer></script>
</body>
</html>
